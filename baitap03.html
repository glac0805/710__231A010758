<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài 3: Đồng hồ đếm ngược</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #2c3e50;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        text-align: center;
      }
      .container {
        background: rgba(255, 255, 255, 0.1);
        padding: 50px;
        border-radius: 20px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      h1 {
        margin-bottom: 10px;
        font-weight: 300;
      }

      #timer {
        font-size: 80px;
        font-weight: bold;
        font-family: "Courier New", Courier, monospace;
        margin: 20px 0;
        transition: color 0.5s;
      }

      /* Hiệu ứng nhấp nháy đỏ khi dưới 1 phút */
      .warning {
        color: #ff4757;
        animation: blink 1s infinite;
      }
      @keyframes blink {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
        100% {
          opacity: 1;
        }
      }

      .home-btn {
        color: #aaa;
        text-decoration: none;
        border: 1px solid #aaa;
        padding: 8px 20px;
        border-radius: 5px;
        transition: 0.3s;
      }
      .home-btn:hover {
        background: white;
        color: #2c3e50;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>THỜI GIAN CÒN LẠI</h1>
      <div id="timer">10:00</div>
      <br /><br />
      <a href="index.html" class="home-btn">Quay lại trang chủ</a>
    </div>

    <script>
      let timeInSeconds = 10 * 60; // 10 phút = 600 giây
      const timerDisplay = document.getElementById("timer");

      const countdown = setInterval(() => {
        timeInSeconds--;

        let mins = Math.floor(timeInSeconds / 60);
        let secs = timeInSeconds % 60;

        // Định dạng hiển thị MM:SS
        timerDisplay.textContent =
          (mins < 10 ? "0" + mins : mins) +
          ":" +
          (secs < 10 ? "0" + secs : secs);

        // Cảnh báo khi dưới 60 giây
        if (timeInSeconds < 60) {
          timerDisplay.classList.add("warning");
        }

        // Khi hết giờ
        if (timeInSeconds <= 0) {
          clearInterval(countdown);
          timerDisplay.textContent = "00:00";
          // Modal Alert
          setTimeout(() => {
            alert("Hết giờ làm bài! Hệ thống sẽ tự động nộp.");
          }, 100);
        }
      }, 1000);
    </script>
  </body>
</html>
