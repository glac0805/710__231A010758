<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài 19: Memory Card Flip Game</title>
    <style>
      :root {
        --primary: #3498db;
        --success: #2ecc71;
        --bg: #f0f2f5;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
      }

      .header-info {
        text-align: center;
        margin-bottom: 20px;
      }

      .stats {
        font-size: 1.2rem;
        font-weight: bold;
        color: #2c3e50;
        margin-bottom: 10px;
      }

      /* Grid Layout: Desktop 4 cột, Mobile 2 cột */
      .game-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
        max-width: 600px;
        width: 100%;
        perspective: 1000px; /* Cần thiết cho hiệu ứng 3D */
      }

      @media (max-width: 480px) {
        .game-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      /* Cấu trúc thẻ lật 3D */
      .card {
        height: 150px;
        cursor: pointer;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        border-radius: 10px;
      }

      .card.flipped {
        transform: rotateY(180deg);
      }

      .card-front,
      .card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        border-radius: 10px;
        border: 2px solid white;
      }

      .card-front {
        background-color: var(--primary);
        color: white;
      }

      .card-back {
        background-color: white;
        transform: rotateY(180deg);
      }

      .card:hover {
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
      }

      .btn-reset {
        margin-top: 30px;
        padding: 10px 25px;
        font-size: 1rem;
        background: var(--success);
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: 0.3s;
      }

      .btn-reset:hover {
        background: #27ae60;
      }

      .back-home {
        margin-top: 15px;
        text-decoration: none;
        color: #7f8c8d;
      }
    </style>
  </head>
  <body>
    <div class="header-info">
      <h2>GAME GHÉP ĐÔI THẺ (MEMORY CARD)</h2>
      <div class="stats">Số lượt click: <span id="moves">0</span></div>
    </div>

    <div class="game-grid" id="gameGrid"></div>

    <button class="btn-reset" onclick="resetGame()">Chơi lại mới</button>
    <a href="index.html" class="back-home">← Về trang chủ</a>

    <script>
      const grid = document.getElementById("gameGrid");
      const moveDisplay = document.getElementById("moves");

      // 8 thẻ (4 cặp icon)
      const cardIcons = ["💻", "📱", "⌨️", "🖱️", "💻", "📱", "⌨️", "🖱️"];
      let flippedCards = [];
      let matchedCount = 0;
      let moves = 0;
      let canFlip = true;

      // 1. Shuffle algorithm (Fisher-Yates)
      function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }

      // 2. Tạo giao diện game
      function initGame() {
        grid.innerHTML = "";
        const shuffled = shuffle([...cardIcons]);
        shuffled.forEach((icon, index) => {
          const card = document.createElement("div");
          card.className = "card";
          card.dataset.icon = icon;
          card.innerHTML = `
                    <div class="card-front">?</div>
                    <div class="card-back">${icon}</div>
                `;
          card.addEventListener("click", flipCard);
          grid.appendChild(card);
        });
      }

      // 3. Logic lật thẻ
      function flipCard() {
        if (
          !canFlip ||
          this.classList.contains("flipped") ||
          flippedCards.length >= 2
        )
          return;

        this.classList.add("flipped");
        flippedCards.push(this);

        moves++;
        moveDisplay.textContent = moves;

        if (flippedCards.length === 2) {
          checkMatch();
        }
      }

      // 4. Kiểm tra khớp
      function checkMatch() {
        canFlip = false;
        const [card1, card2] = flippedCards;

        if (card1.dataset.icon === card2.dataset.icon) {
          matchedCount += 2;
          flippedCards = [];
          canFlip = true;

          if (matchedCount === cardIcons.length) {
            setTimeout(() => {
              alert(`Chúc mừng! Bạn đã thắng sau ${moves} lượt click!`);
            }, 500);
          }
        } else {
          setTimeout(() => {
            card1.classList.remove("flipped");
            card2.classList.remove("flipped");
            flippedCards = [];
            canFlip = true;
          }, 1000);
        }
      }

      function resetGame() {
        moves = 0;
        matchedCount = 0;
        flippedCards = [];
        moveDisplay.textContent = "0";
        canFlip = true;
        initGame();
      }

      // Khởi tạo lần đầu
      initGame();
    </script>
  </body>
</html>
