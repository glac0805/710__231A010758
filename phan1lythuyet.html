<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phần 1: Lý thuyết (Minh chứng ảnh)</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        padding: 20px;
        background-color: #f4f7f9;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .container {
        max-width: 900px;
        width: 100%;
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        text-align: center;
      }
      .back-link {
        align-self: flex-start;
        margin-bottom: 15px;
        text-decoration: none;
        color: #3498db;
        font-weight: bold;
      }
      h2 {
        color: #2c3e50;
        margin-bottom: 20px;
        font-size: 1.5rem;
      }
      .image-box {
        border: 1px solid #eee;
        padding: 10px;
        border-radius: 8px;
      }
      .result-img {
        max-width: 100%;
        height: auto;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>MINH CHỨNG NỘI DUNG LÝ THUYẾT (PHẦN 1)</h2>

      <div class="image-box">
        <img
          src="images/lythuyet1.jpg"
          alt="Minh chứng lý thuyết"
          class="result-img"
        />
      </div>
    </div>
  </body>
</html>
