<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài 2: Form Đăng ký</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f7f9;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }
      .form-card {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
      }
      h2 {
        text-align: center;
        color: #333;
        margin-bottom: 20px;
      }
      .back-link {
        display: block;
        text-align: center;
        margin-bottom: 15px;
        color: #007bff;
        text-decoration: none;
        font-size: 14px;
      }

      .form-group {
        margin-bottom: 15px;
      }
      .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: 600;
        color: #555;
      }
      .form-group input[type="text"],
      .form-group input[type="email"],
      .form-group input[type="password"] {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        box-sizing: border-box;
        font-size: 15px;
      }
      .checkbox-group {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        color: #666;
      }

      .btn-submit {
        width: 100%;
        padding: 12px;
        background-color: #28a745;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        transition: 0.3s;
        margin-top: 10px;
      }
      .btn-submit:hover {
        background-color: #218838;
      }

      #message {
        margin-top: 15px;
        padding: 10px;
        border-radius: 6px;
        display: none;
        text-align: center;
        font-size: 14px;
      }
      .success {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }
      .error {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
    </style>
  </head>
  <body>
    <div class="form-card">
      <a href="index.html" class="back-link">&lt; Quay lại trang chủ</a>
      <h2>ĐĂNG KÝ THÀNH VIÊN</h2>
      <form id="regForm">
        <div class="form-group">
          <label>Họ và tên</label>
          <input
            type="text"
            id="fullname"
            placeholder="Nhập tên của bạn"
            required
          />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            id="email"
            placeholder="example@gmail.com"
            required
          />
        </div>
        <div class="form-group">
          <label>Mật khẩu</label>
          <input
            type="password"
            id="password"
            placeholder="********"
            required
          />
          <small style="color: #888; font-size: 11px"
            >(Ít nhất 8 ký tự, gồm chữ hoa, thường và số)</small
          >
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="agree" required />
          <label for="agree">Tôi đồng ý với điều khoản sử dụng</label>
        </div>
        <button type="submit" class="btn-submit">Đăng ký ngay</button>
      </form>
      <div id="message"></div>
    </div>

    <script>
      const regForm = document.getElementById("regForm");
      const msgDiv = document.getElementById("message");

      regForm.addEventListener("submit", function (e) {
        e.preventDefault();

        const name = document.getElementById("fullname").value;
        const email = document.getElementById("email").value;
        const pass = document.getElementById("password").value;

        // 1. Validate Email bằng Regex
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailPattern.test(email)) {
          showMsg("Email không đúng định dạng!", "error");
          return;
        }

        // 2. Validate Password (>=8 ký tự, 1 hoa, 1 thường, 1 số)
        const passPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;
        if (!passPattern.test(pass)) {
          showMsg(
            "Mật khẩu yếu! Cần ít nhất 8 ký tự, có chữ hoa, thường và số.",
            "error",
          );
          return;
        }

        // 3. Lưu LocalStorage nếu hợp lệ
        const user = { fullName: name, userEmail: email, userPass: pass };
        localStorage.setItem("registeredUser", JSON.stringify(user));

        showMsg("Chúc mừng! Đăng ký thành công và đã lưu dữ liệu.", "success");
        regForm.reset();
      });

      function showMsg(text, type) {
        msgDiv.textContent = text;
        msgDiv.className = type;
        msgDiv.style.display = "block";
      }
    </script>
  </body>
</html>
